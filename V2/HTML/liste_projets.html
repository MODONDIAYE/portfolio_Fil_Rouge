<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste des projets</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 text-gray-800">

<!-- ================= HEADER ================= -->
<header class="bg-blue-900 shadow-md">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-white text-xl font-bold">
            <span class="text-yellow-400">Modou</span> NDIAYE
        </h1>

        <div class="flex gap-6">
            <a href="./index.html" class="text-white hover:text-yellow-400 transition">Accueil</a>
            <a href="./AjouterProjet.html" class="text-white hover:text-yellow-400 transition">Ajouter</a>
            <a href="./contact.html" class="text-white hover:text-yellow-400 transition">Contacts</a>
        </div>
    </nav>
</header>

<!-- ================= CONTENU ================= -->
<main class="max-w-6xl mx-auto px-6 py-10">
      <!-- TITRE -->
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-3xl font-bold text-blue-900">Mes Projets</h2>

        <a href="./AjouterProjet.html"
           class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-yellow-400 transition">
            + Ajouter
        </a>
    </div>

      <!-- ================= GRID ================= -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        <!-- ===== CARD ===== -->
        <!-- Explication:
        group = permet de faire des effets hover sur les enfants
        overflow-hidden = cache les débordements
        -->
        <div class="group bg-white rounded-xl shadow hover:shadow-2xl transition overflow-hidden">

            <!-- IMAGE + OVERLAY -->
            <div class="relative">
                <img src="../img/portfolio.jpg"
                     class="w-full h-44 object-cover group-hover:scale-110 transition duration-500">

                <!-- Overlay sombre au hover -->
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition"></div>

                <!-- Badge -->
                <span class="absolute top-3 left-3 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full font-bold">
                    Web
                </span>
            </div>

            <!-- CONTENU -->
            <div class="p-5">
                <h3 class="font-bold text-lg">Portfolio</h3>
                <p class="text-sm text-gray-500 mt-2">Ajouté le 5 octobre 2023</p>

                <div class="flex gap-3 mt-4">
                    <a href="./voirdetailsP1.html"
                       class="flex-1 text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                        Voir
                    </a>
                    <button class="flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-700 transition">
                        Supprimer
                    </button>
                </div>
            </div>
        </div>

          <!-- ===== CARD 2 ===== -->
        <div class="group bg-white rounded-xl shadow hover:shadow-2xl transition overflow-hidden">

            <div class="relative">
                <img src="../img/concept-application-gestion-taches_23-2148625232.avif"
                     class="w-full h-44 object-cover group-hover:scale-110 transition duration-500">

                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition"></div>

                <span class="absolute top-3 left-3 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full">
                    App
                </span>
            </div>

            <div class="p-5">
                <h3 class="font-bold text-lg">Gestion de tâches</h3>
                <p class="text-sm text-gray-500 mt-2">Ajouté le 15 septembre 2024</p>

                <div class="flex gap-3 mt-4">
                    <a href="#" class="flex-1 text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Voir</a>
                    <button class="flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-700">Supprimer</button>
                </div>
            </div>
        </div>

          <!-- ===== CARD 3 ===== -->
        <div class="group bg-white rounded-xl shadow hover:shadow-2xl transition overflow-hidden">

            <div class="relative">
                <img src="../img/gradient-fitness-app-template_23-2151095461.avif"
                     class="w-full h-44 object-cover group-hover:scale-110 transition">

                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition"></div>

                <span class="absolute top-3 left-3 bg-yellow-400 text-black text-xs px-3 py-1 rounded-full">
                    UI
                </span>
            </div>

            <div class="p-5">
                <h3 class="font-bold text-lg">UI Fitness</h3>
                <p class="text-sm text-gray-500 mt-2">Ajouté le 10 novembre 2025</p>

                <div class="flex gap-3 mt-4">
                    <a href="#" class="flex-1 text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Voir</a>
                    <button class="flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-700">Supprimer</button>
                </div>
            </div>
        </div>





</main>

</body>
</html>
