<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un projet</title>
    <link rel="stylesheet" href="../CSS/AjouterProjet.css">
</head>
<body>

<header>
    <nav class="nav-menu">
        <a href="./index.html">Accueil</a>
        <a href="./liste_projets.html">Liste</a>
        <a href="./contact.html">Contacts</a>
    </nav>
</header>

<main class="content">
    <h2>Ajouter un projet</h2>

    <form class="project-form">

        <label>Nom du projet</label>
        <input type="text" placeholder="Ex : Plateforme E-commerce" required>

        <label>Description</label>
        <textarea placeholder="Décrivez votre projet..." required></textarea>

        <label>Image du projet</label>
        <input type="file" accept="image/*">

        <label>Technologies utilisées</label>
        <input type="text" placeholder="Ex : HTML, CSS, JavaScript, React">

        <label>Lien du projet (GitHub ou site)</label>
        <input type="url" placeholder="https://">

        <label>Date d’ajout</label>
        <input type="date">

        <button type="submit" class="btn-submit">Enregistrer</button>
    </form>
</main>

</body>
</html>
