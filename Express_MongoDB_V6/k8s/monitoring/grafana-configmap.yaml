apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'portfolio'
        orgId: 1
        folder: 'Portfolio'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-portfolio
  namespace: monitoring
data:
  portfolio-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Requetes HTTP / seconde",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(http_requests_total{job=\"portfolio-backend\"}[5m])",
              "legendFormat": "{{method}} {{route}} - {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "title": "Temps de reponse (P50 / P95 / P99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{job=\"portfolio-backend\"}[5m]))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"portfolio-backend\"}[5m]))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job=\"portfolio-backend\"}[5m]))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "title": "Taux d'erreur HTTP 5xx",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"portfolio-backend\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"portfolio-backend\"}[5m])) * 100",
              "legendFormat": "Error Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "title": "Requetes totales",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"portfolio-backend\"})",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "fixedColor": "blue", "mode": "fixed" }
            }
          }
        },
        {
          "title": "Uptime Backend",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "up{job=\"portfolio-backend\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } }, "type": "value" }
              ]
            }
          }
        },
        {
          "title": "Pods actifs",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 8 },
          "targets": [
            {
              "expr": "count(up{job=\"portfolio-backend\"} == 1)",
              "legendFormat": "Pods UP"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "green", "mode": "fixed" }
            }
          }
        },
        {
          "title": "Utilisation CPU (backend)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"portfolio-backend\"}[5m]) * 100",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          }
        },
        {
          "title": "Utilisation Memoire (backend)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"portfolio-backend\"} / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 150 },
                  { "color": "red", "value": 250 }
                ]
              }
            }
          }
        },
        {
          "title": "Connexions MongoDB actives",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "mongodb_connections_current",
              "legendFormat": "Connexions actives"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "fixedColor": "orange", "mode": "fixed" }
            }
          }
        },
        {
          "title": "Requetes par endpoint",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "sum by(route) (http_requests_total{job=\"portfolio-backend\"})",
              "legendFormat": "{{route}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["portfolio", "express", "mongodb"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Portfolio Express MongoDB - Supervision",
      "uid": "portfolio-main",
      "version": 1
    }
